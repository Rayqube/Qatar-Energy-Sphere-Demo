<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity Web Player | Rayqube URP</title>
    <style>
        /* Reset margins and ensure the body fills the entire screen */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents unwanted scrollbars */
            background: #231F20;
        }

        /* Force the canvas to stretch to the boundaries of the body */
        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/Qatar Energy Sphere Demo.loader.js"></script>
    <script>
        // The mobile check is no longer needed because the CSS above handles responsiveness for all screens.

        createUnityInstance(document.querySelector("#unity-canvas"), {
            arguments: [],
            dataUrl: "Build/Qatar Energy Sphere Demo.data",
            frameworkUrl: "Build/Qatar Energy Sphere Demo.framework.js",
            codeUrl: "Build/Qatar Energy Sphere Demo.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Rayqube URP",
            productVersion: "0.1.0",
            // matchWebGLToCanvasSize: true, // Typically defaults to true, ensures rendering matches canvas size
            // devicePixelRatio: window.devicePixelRatio, // Uncomment this to fix blurry text/graphics on high-DPI (Retina) displays.
        });
    </script>
</body>
</html>
